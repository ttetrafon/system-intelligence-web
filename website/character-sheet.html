<!DOCTYPE html>

<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0,
      user-scalable=yes, target-densitydpi=device-dpi">
  <title>Character Sheet</title>
  <script src="./src/script-cs.js" type="module" defer></script>

<body>
  <main>
    <section id="page-1">
      <article id="general-info">
        <h2>GENERAL</h2>
        <cs-simple-entry-line label="Name" checkbox="hidden"></cs-simple-entry-line>
        <cs-simple-entry-line label="Experience Tier (ET)" checkbox="hidden"></cs-simple-entry-line>
        <div class="flex-row">
          <div class="flex-column flex-item-resizable">
            <cs-simple-entry-line label="Mythic Tier (ET)" checkbox="hidden"></cs-simple-entry-line>
            <cs-simple-entry-line label="Divine Tier (ET)" checkbox="hidden"></cs-simple-entry-line>
          </div>
          <div class="flex-column flex-item-resizable-small">
            <cs-simple-entry-line label="TK" checkbox="normal"></cs-simple-entry-line>
            <cs-simple-entry-line label="MA" checkbox="normal"></cs-simple-entry-line>
          </div>
        </div>
        <cs-simple-entry-multiline label="Species (types)" lines="2" checkbox="hidden"></cs-simple-entry-multiline>
        <div class="flex-row">
          <cs-simple-entry-line label="Size" checkbox="hidden" class="flex-item-resizable"></cs-simple-entry-line>
          <cs-simple-entry-line label="LUCK" checkbox="hidden" class="flex-item-resizable-small"></cs-simple-entry-line>
        </div>
        <cs-skill-level-entry-line label="Age" checkbox="hidden" ></cs-skill-level-entry-line>
      </article>

      <article id="attributes">
        <h2>ATTRIBUTES</h2>
        <table>
          <thead>
            <tr>
              <th>APP</th>
              <th>DEX</th>
              <th>END</th>
              <th>MIG</th>
              <th>TEC</th>
              <th><i>Body</i></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tbody>
          <thead>
            <tr>
              <th>IMA</th>
              <th>MEM</th>
              <th>PER</th>
              <th>REA</th>
              <th>WIL</th>
              <th><i>Mind</i></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tbody>
          <thead>
            <th>CON</th>
            <th>EMP</th>
            <th>PRE</th>
            <th>RES</th>
            <th>WIS</th>
            <th><i>Spirit</i></th>
          </thead>
          <tbody>
            <tr>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </article>

      <article id="senses">
        <h2>SENSES</h2>
        <cs-senses></cs-senses>
      </article>

      <article id="movement">
        <h2>MOVEMENT</h2>
        <cs-movement></cs-movement>
      </article>

      <article id="morality">
        <h2>MORALITY</h2>
        <cs-morality></cs-morality>
      </article>

      <article id="languages">

        <cs-simple-entry-line label="_" checkbox="normal"></cs-simple-entry-line>
        <cs-simple-entry-line label="_" checkbox="normal"></cs-simple-entry-line>
      </article>
